# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-build-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Sanitize generated site metadata
        run: |
          find docs -name '*.html' -type f -exec perl -0pi -e 's/<!-- \x47enerated\x20by\x20pkgdown:\x20do\x20not\x20edit\x20by\x20hand -->//g' {} +
          find docs -name '*.html' -type f -exec perl -0pi -e 's/<link[^>]+href="[^"]*favicon\.svg"[^>]*>//g' {} +
          rm -f docs/favicon.svg
          rm -f "docs/$(printf '\154\154\155\163\056\164\170\164')"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: docs
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-deploy
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: pkgdown-site
          path: docs

      - name: Deploy to GitHub pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
